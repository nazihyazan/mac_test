app-id: com.nazih.floatboard
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: floatboard
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: floatboard
    buildsystem: simple
    build-commands:
      - chmod +x FloatBoard-1.0.15-linux.AppImage
      - ./FloatBoard-1.0.15-linux.AppImage --appimage-extract
      - mkdir -p /app/bin /app/opt/floatboard /app/share/applications /app/share/icons/hicolor/512x512/apps /app/share/metainfo
      - cp -r squashfs-root/* /app/opt/floatboard/
      - install -Dm755 floatboard.sh /app/bin/floatboard
      - install -Dm644 com.nazih.floatboard.desktop /app/share/applications/
      - install -Dm644 com.nazih.floatboard.metainfo.xml /app/share/metainfo/
      - cp FloatBoard_Store_Icon_300x300.png /app/share/icons/hicolor/512x512/apps/com.nazih.floatboard.png || true
    sources:
      - type: file
        url: https://github.com/nazihyazan/mac_test/releases/download/1.0.15/FloatBoard-1.0.15-linux.AppImage
        sha256: "6e4ad264718d33facc6fbe4c4ec33b0dab8b19d5fd6126ff88856586540718eb"
      - type: file
        path: FloatBoard_Store_Icon_300x300.png
      - type: script
        dest-filename: floatboard.sh
        commands:
          - zypak-wrapper /app/opt/floatboard/floatboard "$@"
      - type: file
        path: com.nazih.floatboard.desktop
      - type: file
        path: com.nazih.floatboard.metainfo.xml
