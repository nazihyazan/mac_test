name: Build Cross-Platform App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Windows Store App (AppX) & Exe
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build:win
          npx electron-builder --win appx -c.directories.output=dist/windows

      - name: Build macOS App
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Build Linux App (Deb, RPM, AppImage)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floatboard-${{ matrix.os }}
          path: |
            dist/windows/*.exe
            dist/windows/*.appx
            dist/macos/*.zip
            dist/macos/*.dmg
            dist/linux/*.deb
            dist/linux/*.rpm
            dist/linux/*.AppImage
          retention-days: 7

      - name: Upload to Release v1.0.13
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Only upload files that actually exist in the current runner's dist folders
          files=()
          for f in dist/windows/*.exe dist/windows/*.appx dist/macos/*.zip dist/macos/*.dmg dist/linux/*.deb dist/linux/*.rpm dist/linux/*.AppImage; do
            if [ -f "$f" ]; then
              files+=("$f")
            fi
          done
          
          if [ ${#files[@]} -gt 0 ]; then
            # Create release if it doesn't exist
            gh release view v1.0.13 || gh release create v1.0.13 --title "FloatBoard v1.0.13" --notes "Windows Store Tile Icons Fix"
            gh release upload v1.0.13 "${files[@]}" --clobber
          fi
