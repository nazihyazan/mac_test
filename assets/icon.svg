<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle drop shadow for the main blue square -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16" />
      <feOffset dx="0" dy="16" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Light gray outline of a second square, visible at an angle beneath -->
  <g transform="translate(220, 290) rotate(-12)">
    <rect x="-140" y="-140" width="280" height="280" rx="36" fill="none" stroke="#CBD5E1" stroke-width="20" />
  </g>

  <!-- Main, solid colored blue square, slightly elevated -->
  <g transform="translate(290, 220)">
    <rect x="-140" y="-140" width="280" height="280" rx="36" fill="#00A3FF" filter="url(#shadow)" />
    
    <!-- Two simple, white horizontal lines representing text snippets -->
    <rect x="-70" y="-30" width="140" height="24" rx="12" fill="#FFFFFF" />
    <rect x="-70" y="14" width="90" height="24" rx="12" fill="#FFFFFF" />
  </g>
</svg>
